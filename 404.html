<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lost the trail, Siddhant Nagraj</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%230b0b0c'/%3E%3Ctext x='32' y='45' font-family='Arial,sans-serif' font-size='32' font-weight='900' fill='%23f2efe9' text-anchor='middle'%3ESN%3C/text%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    :root { --bg:#0b0b0c; --ink:#f2f1ec; --ink-2:#b9b8b2; --ink-3:#75746f; --accent:#f7c14a; --line:rgba(255,255,255,.12); }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      background: var(--bg); color: var(--ink);
      font-family: 'Archivo', system-ui, sans-serif;
      display: flex; align-items: center; justify-content: center;
      padding: 32px; text-align: center;
      background-image: radial-gradient(circle at 1px 1px, rgba(255,255,255,.04) 1px, transparent 0);
      background-size: 24px 24px;
    }
    .wrap { max-width: 600px; }
    .eyebrow { font-family: 'Space Mono', monospace; font-size: 12px; letter-spacing: .18em; text-transform: uppercase; color: var(--accent); margin-bottom: 28px; }
    .big {
      font-weight: 900; font-size: clamp(96px, 26vw, 240px); line-height: .82; letter-spacing: -.04em;
      color: transparent; -webkit-text-stroke: 2px var(--ink); position: relative;
    }
    .big span { color: var(--accent); -webkit-text-stroke: 0; }
    h1 { font-weight: 800; font-size: clamp(22px, 4vw, 34px); letter-spacing: -.02em; margin: 28px 0 14px; }
    p { color: var(--ink-2); font-size: clamp(15px, 2vw, 17px); line-height: 1.6; max-width: 44ch; margin: 0 auto 36px; }
    .home {
      display: inline-flex; align-items: center; gap: 10px;
      font-family: 'Space Mono', monospace; font-size: 13px; letter-spacing: .06em; text-transform: uppercase;
      color: var(--bg); background: var(--accent); border-radius: 999px; padding: 15px 26px;
      text-decoration: none; transition: transform .25s ease, box-shadow .25s ease;
    }
    .home:hover { transform: translateY(-2px); box-shadow: 0 14px 34px rgba(247,193,74,.32); }
    .home .arr { transition: transform .25s ease; }
    .home:hover .arr { transform: translateX(4px); }
    .foot { margin-top: 48px; font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: .1em; text-transform: uppercase; color: var(--ink-3); }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="eyebrow">( Error 404 )</div>
    <div class="big">4<span>0</span>4</div>
    <h1>This page took a wrong turn.</h1>
    <p>The link you followed doesn't exist, or it moved. No harm done, let's get you back to the work that does.</p>
    <a class="home" href="/">Back to home <span class="arr">&rarr;</span></a>
    <div class="foot">Siddhant Nagraj, Product Designer</div>
  </main>
  <script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
